version: '3.8'

services:

  # MongoDB database
  mongo:
    image: mongo:6
    container_name: todo-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Express + React app
  app:
    build: .
    container_name: todo-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/todoapp
      - PORT=5000
    depends_on:
      - mongo

volumes:
  mongo-data: